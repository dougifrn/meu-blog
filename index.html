<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLOG DOUGPR</title>
    <style>
        /* Estilização Geral */
        body {
            background-color: lightblue;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.6;
        }

        /* Cabeçalho */
        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #e9b662;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Conteúdo Principal */
        main {
            background-color: rgba(255, 255, 255, 0.4);
            padding: 25px;
            border-radius: 15px;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        p {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 15px;
        }

        /* Imagem */
        .logo-blog {
            max-width: 250px;
            height: auto;
            margin: 20px 0;
            border-radius: 10px;
        }

        /* Link do Instagram (Linha 16) */
        .instagram-link {
            display: inline-block;
            margin-top: 20px;
            color: rgb(0, 0, 0);
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 12px 25px;
            border: 2px solid #080808;
            background-color: rgb(149, 226, 236);
            transition: transform 0.2s, background-color 0.2s;
        }

        .instagram-link:hover {
            transform: scale(1.05);
            background-color: #e9b662;
            color: white;
            border-color: #e9b662;
        }
    </style>
</head>
<body>

    <header>
        <h1>MEU BLOG PESSOAL</h1>
    </header>

    <main>
        <img src="https://via.placeholder.com/250">
        
        <p>Nesse site eu vou contar um pouco sobre a minha vida.</p>
        <p>Sou um estudante de programação iniciante.</p>
        <p>Estou amando a experiência; confesso que não é fácil, mas tudo vai se desenvolvendo.</p>
        <p>Estou sempre praticando para aprender rápido.</p>

        <a href="https://www.instagram.com/douggpr" target="_blank" class="instagram-link">
            MEU INSTAGRAM
        </a>
    </main>

</body>
</html>
